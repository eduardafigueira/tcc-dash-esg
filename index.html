    <script>
        // =====================================================================
        // DADOS INTEGRAIS DOS RELATÓRIOS (Textos completos das Etapas 1 a 10)
        // =====================================================================
        
        // --- H1: SCORES ESG ---
        const h1Gemini = [
            // ETAPA 1
            `
            <h3 class="font-bold text-brand-light mt-4 mb-2">Decomposição Lógica</h3>
            <table class="academic-table">
                <tr><th>ID</th><th>Afirmação Componente</th><th>Tipo Lógico</th></tr>
                <tr><td>A1</td><td>Scores ESG atuam como preditores de eficiência socioambiental futura ou latente.</td><td>Causal / Preditiva</td></tr>
                <tr><td>A2</td><td>Carteiras com high-ESG geram benefícios físicos mensuráveis (emissões evitadas, etc.).</td><td>Causal / Quantificável</td></tr>
                <tr><td>A3</td><td>A magnitude do benefício socioambiental é equivalente ou superior ao retorno financeiro.</td><td>Normativa / Relacional</td></tr>
            </table>
            <h3 class="font-bold text-brand-light mt-4 mb-2">Pressupostos Implícitos</h3>
            <table class="academic-table">
                <tr><th>ID</th><th>Pressuposto Implícito Assumido</th><th>Status Epistêmico</th></tr>
                <tr><td>P_I1</td><td>Scores ESG são projetados para medir impacto sistêmico ("Double Materiality") e não apenas risco financeiro de passivos ambientais ("Single Materiality").</td><td><strong>Problemático</strong> (Conflita com metodologias de mercado)</td></tr>
                <tr><td>P_I2</td><td>Existe homogeneidade na mensuração dos scores entre diferentes agências para a mesma instituição financeira no Brasil.</td><td><strong>Não evidenciado</strong> (Alta divergência documentada)</td></tr>
                <tr><td>P_I3</td><td>Instituições Financeiras relatam de forma fidedigna as "Emissões Financiadas" (Escopo 3, Cat. 15), base para a eficiência ambiental do setor.</td><td><strong>Parcialmente evidenciado</strong></td></tr>
            </table>
            <h3 class="font-bold text-brand-light mt-4 mb-2">Separação: Fatos x Narrativas</h3>
            <ul class="list-disc pl-5 space-y-2 text-gray-700">
                <li><strong>Fatos observáveis:</strong>
                    <ul class="list-circle pl-5 mt-1 space-y-1">
                        <li>Existência de scores ESG emitidos por agências (MSCI, Refinitiv, S&P) para bancos brasileiros.</li>
                        <li>Resolução CVM 59/2021 exige práticas de relato ESG (comply or explain) no Formulário de Referência.</li>
                        <li>Carteiras teóricas como o ISE B3 que aglutinam empresas segundo critérios declaratórios de sustentabilidade.</li>
                    </ul>
                </li>
                <li><strong>Interpretações/narrativas:</strong>
                    <ul class="list-circle pl-5 mt-1 space-y-1">
                        <li>A pontuação alta de um banco reflete que ele está "salvando o planeta" (muitas vezes reflete apenas baixo risco de multas ambientais para suas operações diretas).</li>
                        <li>Inclusão de um banco no ISE B3 significa garantia de emissões indiretas controladas.</li>
                    </ul>
                </li>
            </ul>`,

            // ETAPA 2
            `<ul class="list-disc pl-5 space-y-3 text-gray-700">
                <li><strong>H1 (Hipótese de Convergência / Otimista - Alinhada ao estudante):</strong> Os scores ESG de fato capturam o compromisso ambiental e social profundo das instituições.
                    <ul class="list-circle pl-5 mt-1 text-gray-600">
                        <li><strong>P1:</strong> Agências de rating conseguem medir externalidades positivas reais.</li>
                        <li><strong>P2:</strong> O mercado brasileiro precifica esse impacto de forma eficiente, criando alinhamento entre retorno ajustado e bem-estar social.</li>
                    </ul>
                </li>
                <li><strong>H2 (Hipótese do Desacoplamento e Greenwashing Institucional - OBRIGATÓRIA):</strong> Scores ESG no setor financeiro medem estritamente mitigação de risco financeiro próprio (Single Materiality) e sofrem de intenso viés declaratório ("ESG Decoupling").
                    <ul class="list-circle pl-5 mt-1 text-gray-600">
                        <li><strong>P1:</strong> Bancos com altos scores têm excelência em governança de processos de *reporting*, mas não necessariamente mitigam suas Emissões Financiadas.</li>
                        <li><strong>P2:</strong> Ocorre uma correlação negativa entre a "performance aparente" (score) e o "impacto real" absoluto de carbono/inclusão.</li>
                    </ul>
                </li>
                <li><strong>H3 (Hipótese da Heterogeneidade Estrutural / Condicional):</strong> A validade preditiva do score no Brasil depende estritamente do tipo de carteira (crédito vs. tesouraria) e do porte da instituição.
                    <ul class="list-circle pl-5 mt-1 text-gray-600">
                        <li><strong>P1:</strong> A relação positiva score/impacto só existe em fundos de <em>Impact Investing</em> explícitos (mercado nichado), falhando miseravelmente no <em>broad market</em> devido à imaturidade regulatória local comparada à SFDR europeia.</li>
                        <li><strong>P2:</strong> Grandes bancos compram consultorias para otimizar scores (inflação de rating), enquanto firmas menores não conseguem, quebrando a linearidade do indicador.</li>
                    </ul>
                </li>
            </ul>`,

            // ETAPA 3
            `<table class="academic-table">
                <tr><th>Hipótese</th><th>Evidência Empírica Estritamente Necessária</th><th>Meu Acesso (IA)</th><th>Status no Mundo Real</th></tr>
                <tr><td>H1</td><td>Séries temporais (5+ anos) cruzando Scores ESG (ex: MSCI) de bancos B3 com seus inventários de GEE (Escopo 3 - Financiadas) validados pelo GHG Protocol.</td><td>Parcial (Padrões estatísticos macro)</td><td>Limitado (Escopo 3 ainda mal reportado por bancos)</td></tr>
                <tr><td>H2</td><td>Estudos empíricos medindo "Rating Divergence" e evidências quantitativas de "ESG Decoupling" em relatórios corporativos.</td><td>Total (Base acadêmica pesquisada)</td><td>Disponível (Alta documentação na literatura)</td></tr>
                <tr><td>H3</td><td>Dados granulares da CVM sobre composição de carteiras rotuladas "ESG" vs. performance de descarbonização por tamanho de fundo.</td><td>Nenhum direto (Não consulto SQL privado da CVM)</td><td>Crítico/Indisponível (Exige raspagem de dados e regressão própria)</td></tr>
            </table>`,

            // ETAPA 4
            `<p class="mb-3 text-gray-700">As evidências abaixo embasam a construção lógica que se segue:</p>
            <h3 class="font-bold text-brand-light mt-4 mb-2">Evidência A: Estudo sobre Divergência de Ratings ESG (Berg et al.)</h3>
            <ul class="list-disc pl-5 mb-4 space-y-1 text-gray-700">
                <li><strong>4.1 Origem:</strong> Secundária (Artigo Acadêmico). <em>Tenho acesso a esta fonte via web search.</em></li>
                <li><strong>4.2 Verificabilidade:</strong> Sim. "Aggregate Confusion: The Divergence of ESG Ratings" (Berg, Kölbel, Rigobon). DOI ou repositório MIT Sloan disponíveis.</li>
                <li><strong>4.3 Consistência:</strong> Altamente consistente. É o trabalho seminal mostrando que 56% da variação de scores vem de divergência de medição.</li>
                <li><strong>4.4 Viés de Fonte:</strong> Baixo (Acadêmico independente).</li>
                <li><strong>4.5 Classificação Final:</strong> <strong class="text-green-600">VERIFICADA</strong>.</li>
            </ul>
            <h3 class="font-bold text-brand-light mt-4 mb-2">Evidência B: Desacoplamento ESG (ESG Decoupling) e Risco de Greenwashing (Kathan et al., 2025)</h3>
            <ul class="list-disc pl-5 mb-4 space-y-1 text-gray-700">
                <li><strong>4.1 Origem:</strong> Secundária (Artigo Acadêmico). <em>Tenho acesso a esta fonte via web search recente.</em></li>
                <li><strong>4.2 Verificabilidade:</strong> Sim. Kathan et al., "What you see is not what you get: ESG scores and greenwashing risk" (2025).</li>
                <li><strong>4.3 Consistência:</strong> Confirma empiricamente que altas pontuações ESG correlacionam com performance aparente, não com impacto real.</li>
                <li><strong>4.4 Viés de Fonte:</strong> Baixo (Acadêmico).</li>
                <li><strong>4.5 Classificação Final:</strong> <strong class="text-green-600">VERIFICADA</strong>.</li>
            </ul>
            <h3 class="font-bold text-brand-light mt-4 mb-2">Evidência C: Alinhamento das Carteiras de Fundos Brasileiros (CVM)</h3>
            <ul class="list-disc pl-5 mb-4 space-y-1 text-gray-700">
                <li><strong>4.1 Origem:</strong> Primária (Dados Regulatórios). <em>Estou inferindo a existência desta evidência por padrão estatístico do meu treinamento sobre finanças no Brasil.</em></li>
                <li><strong>4.2 Verificabilidade:</strong> <em>Esta evidência específica (microdados de cada fundo hoje) não é verificável por mim e deve ser tratada como inferência.</em></li>
                <li><strong>4.3 Consistência:</strong> Consistente com relatórios setoriais da Anbima sobre fundos IS (Investimento Sustentável).</li>
                <li><strong>4.4 Viés de Fonte:</strong> Moderado (Auto-relato gerencial validado de forma incipiente por auditores).</li>
                <li><strong>4.5 Classificação Final:</strong> <strong class="text-yellow-600">INFERIDA</strong>.</li>
            </ul>`,

            // ETAPA 5
            `<div class="font-mono text-[11.5px] leading-relaxed bg-slate-100 p-4 rounded block whitespace-pre-wrap my-3 border border-slate-200 text-slate-700">Premissa 1 (P1): Metodologias predominantes de Score ESG foram desenhadas para avaliar o risco que fatores socioambientais representam para o balanço da empresa, não o impacto físico da empresa no mundo (Evidência A - VERIFICADA).
-> Status: Suportada.

Premissa 2 (P2): Estudos empíricos recentes demonstram que empresas com as maiores pontuações ESG apresentam as maiores taxas de "greenwashing" (ação externa/aparente descolada de KPI interno/real) (Evidência B - VERIFICADA).
-> Status: Suportada.

Conclusão Intermediária (C1): É logicamente incorreto assumir universalmente que um Score ESG alto prevê eficiência socioambiental (Falsifica A1 da hipótese original).

[Ponto de transição: a partir daqui, o argumento é ABDUTIVO/INDUTIVO]

Premissa 3 (P3): O mercado financeiro brasileiro tem assimetria informacional agravada e regulação de duplo impacto (Double Materiality) em fase inicial (Inferência baseada em padrões de mercados emergentes - INFERIDA).

Conclusão Final (C2): Portanto, no Brasil, as carteiras com melhores pontuações ESG tendem a capturar empresas com alta capacidade de compliance e reporting, e não necessariamente aquelas que geram benefícios físicos mensuráveis (como redução de carbono) superiores aos retornos de capital.</div>
            <p class="mt-3 text-gray-700"><strong>Tipo de Argumento Final:</strong> <strong class="text-brand-dark">ABDUTIVO</strong> (É a melhor explicação disponível para os dados anômalos no mercado, porém não é uma certeza matemática dedutiva aplicável a 100% dos fundos).</p>`,

            // ETAPA 6
            `<h3 class="font-bold text-brand-light mt-2 mb-2">6.1 Testes Empíricos (Propostos para o Estudante Executar)</h3>
            <table class="academic-table mb-5">
                <tr><th>O Quê</th><th>Período</th><th>Fonte de Dados</th><th>Método</th><th>Falseia H1 se:</th><th>Falseia H2 se:</th><th>Quem faz</th></tr>
                <tr><td>Correlação: Score x Emissões Financiadas</td><td>2021-2025</td><td>Bloomberg/Refinitiv e Relatórios B3</td><td>Regressão em Painel (Efeitos Fixos)</td><td>Instituições high-ESG tiverem aumento de emissões (Escopo 3) ao longo do tempo.</td><td>Houver redução absoluta de emissões alinhada milimetricamente com a subida do Score.</td><td>Pesquisador do TCC</td></tr>
                <tr><td>Análise de Desacoplamento</td><td>2020-2025</td><td>Formulários de Referência CVM (CVM 59)</td><td>Análise Lexical (NLP) vs. Capex verde</td><td>O volume de menções textuais ESG crescer sem aumento do Capex.</td><td>Capex em sustentabilidade ditar a variação do score.</td><td>Pesquisador do TCC</td></tr>
            </table>
            <h3 class="font-bold text-brand-light mt-4 mb-2">6.2 Testes Teóricos</h3>
            <table class="academic-table mb-5">
                <tr><th>Teste Teórico (Coerência com a Literatura)</th><th>Resultado Esperado</th></tr>
                <tr><td>Teoria da Agência (Agency Theory)</td><td>Gestores priorizam <em>window-dressing</em> para maximizar bônus no curto prazo. Suporta H2.</td></tr>
                <tr><td>Hipótese dos Mercados Eficientes (EMH)</td><td>Se a informação ESG fosse perfeita (H1), o risco climático já estaria integralmente precificado. O ágio verde (Greenium) tenderia a zero no equilíbrio.</td></tr>
            </table>
            <h3 class="font-bold text-brand-light mt-4 mb-2">6.3 Testes por Analogia</h3>
            <ul class="list-disc pl-5 space-y-2 text-gray-700">
                <li><strong>Mercado Europeu (SFDR):</strong> Após taxonomia rigorosa, centenas de fundos "Artigo 9" (Dark Green) foram rebaixados. <em>Limites:</em> A CVM não possui taxonomia tão restritiva (2026), sugerindo que greenwashing seja mais fácil no Brasil.</li>
                <li><strong>Mercado Chinês:</strong> Estudos mostram que regulação estrita municipal reduz desacoplamento. <em>Limites:</em> O modelo de intervenção estatal no crédito chinês difere da livre concorrência brasileira.</li>
            </ul>`,

            // ETAPA 7
            `<div class="border-l-4 border-purple-500 bg-purple-50 p-4 my-3 text-gray-800">
                A hipótese original do TCC baseia-se num equívoco epistêmico (a confusão entre risco financeiro e impacto ambiental). Evidências demonstram a predominância do fenômeno de desacoplamento.
                <br><br>
                <strong>Grau de Confiança: ALTO</strong> (A literatura mais recente e de ponta global corrobora que scores refletem mitigação de risco e "fala", em vez de "impacto material físico").
            </div>
            <p class="mt-4 mb-2 text-gray-700"><strong>O que essa conclusão NÃO resolve:</strong></p>
            <ul class="list-disc pl-5 mb-5 text-gray-700 space-y-1">
                <li>Se fundos de nicho (private equity de impacto) também sofrem de métricas falhas.</li>
                <li>Como criar um score alternativo perfeitamente correlacionado ao impacto físico no Brasil.</li>
                <li>A rentabilidade futura exata das carteiras não-ESG (bancos clássicos intensivos em carbono).</li>
            </ul>
            <div class="border-l-4 border-green-500 bg-green-50 p-4 my-3 text-gray-800">
                <strong>HIPÓTESE REFORMULADA (Sugestão para o TCC):</strong><br>
                "Os scores ESG de instituições financeiras no Brasil atuam primariamente como indicadores de governança e de mitigação de risco financeiro institucional ('Single Materiality'). Em vez de predizerem benefícios socioambientais físicos equivalentes ao retorno, eles evidenciam um desacoplamento (ESG decoupling), onde carteiras bem pontuadas otimizam rentabilidade ajustada ao risco e métricas reputacionais, mantendo as externalidades reais inalteradas ou não reportadas de forma homogênea."
            </div>`,

            // ETAPA 8
            `<table class="academic-table">
                <tr><th>Critério que falsearia a Conclusão Provisória (C2)</th><th>Implicação para o Estudo</th></tr>
                <tr><td>A CVM liberar dados provando que 80% das ações listadas no ISE B3 cortaram suas emissões absolutas Escopo 1, 2 e 3 em linha com as metas do Acordo de Paris, superando pares fora do índice.</td><td>Validaria a tese de que no mercado brasileiro, diferentemente do global, o rating reflete ação real, ressuscitando a H1 (Otimista).</td></tr>
                <tr><td>Artigos acadêmicos de 2026 demonstrarem que as novas versões das metodologias da Refinitiv (pós pressões globais) zeraram a divergência de métricas, gerando R² de 0.9 com impacto real.</td><td>O problema metodológico seria temporário. A reformulação deveria focar no gap cronológico, não no conceito em si.</td></tr>
            </table>`,

            // ETAPA 9
            `<div class="border-l-4 border-orange-500 bg-orange-50 p-3 my-3 font-bold text-orange-800">
                ATENÇÃO ÀS SEGUINTES LIMITAÇÕES ANTES DA REDAÇÃO DO TCC:
            </div>
            <h3 class="font-bold text-brand-light mt-4 mb-2">9.1 Tabela de Dependências de Treinamento Estatístico</h3>
            <table class="academic-table mb-5">
                <tr><th>Elemento da Análise</th><th>Tipo de Dependência</th></tr>
                <tr><td>Interpretação do comportamento da CVM</td><td>Inferred from text patterns about Brazilian regulatory inertia and recent macro movements até a data atual.</td></tr>
                <tr><td>Conexão causal de "Greenwashing" em bancos BR</td><td>Extrapolação estatística global aplicável a mercados emergentes (Falta prova definitiva local na minha base latente).</td></tr>
            </table>
            <h3 class="font-bold text-brand-light mt-4 mb-2">9.2 Passos Exigindo Validação Empírica Humana</h3>
            <ol class="list-decimal pl-5 mb-5 space-y-1 text-gray-700">
                <li>O estudante deve obrigatoriamente baixar os dados do ISE B3 e extrair as metodologias abertas no portal B3.</li>
                <li>Buscar no terminal Bloomberg/Economatica as pontuações ESG específicas da amostra local brasileira.</li>
                <li>Mapear quantos bancos de capital aberto publicam a categoria 15 do Escopo 3 (Financed Emissions).</li>
            </ol>
            <h3 class="font-bold text-brand-light mt-4 mb-2">9.3 Prioridade Máxima</h3>
            <div class="border-l-4 border-red-500 bg-red-50 text-red-800 p-4 my-3">
                <ol class="list-decimal pl-5 space-y-2 font-medium">
                    <li>NÃO cite as afirmações teóricas desta interface como dado empírico.</li>
                    <li>VERIFIQUE independentemente se houve atualização da Resolução CVM 59 no ano corrente (2026) impondo taxonomia rígida, pois isso altera todo o quadro de H3.</li>
                    <li>O TCC será duramente criticado pela banca se adotar a visão romântica do "Score = Impacto". Foque no desacoplamento.</li>
                </ol>
            </div>`,

            // ETAPA 10
            `<p class="mb-4 text-gray-700">Busca ativa realizada com foco na literatura acadêmica empírica mais recente (incluindo avanços documentados em 2024, 2025 e 2026) que trata de métricas ESG, impacto real, greenwashing, rating divergence e desacoplamento institucional.</p>
            <div class="border-l-4 border-purple-500 bg-purple-50 p-4 my-4 text-gray-800">

        // Toggle Abas Superiores (Hipóteses)
        function switchMainTab(tabId) {
            document.querySelectorAll('.main-tab-btn').forEach(btn => {
                btn.classList.remove('border-brand-light', 'text-brand-dark', 'font-semibold', 'border-brand-dark');
                btn.classList.add('border-transparent', 'text-gray-500');
                
                // Se for botão Comparativo Geral (inativo = texto azul escuro, sem borda)
                if(btn.id === 'tab-btn-side') {
                    btn.classList.remove('text-gray-500');
                    btn.classList.add('text-brand-dark', 'font-bold');
                }
            });
            
            const currentBtn = document.getElementById('tab-btn-' + tabId);
            currentBtn.classList.remove('border-transparent', 'text-gray-500');
            
            if(tabId !== 'side') {
                currentBtn.classList.add('border-brand-light', 'text-brand-dark', 'font-semibold');
            } else {
                // Ativa a borda escura se for Comparativo Geral
                currentBtn.classList.add('border-brand-dark', 'text-brand-dark', 'font-bold');
            }

            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            document.getElementById(tabId + '-container').classList.add('active');
        }

        // Toggle Perspectivas de IA (Botões Inferiores)
        function switchPerspective(hypoId, viewId) {
            const section = document.getElementById(hypoId + '-container');
            
            section.querySelectorAll('.sub-tab-btn').forEach(btn => {
                btn.classList.remove('bg-white', 'shadow-sm', 'text-brand-dark', 'font-bold', 'border', 'border-gray-200');
                btn.classList.add('text-gray-500', 'font-semibold', 'hover:bg-gray-200/50');
            });
            
            const selectedBtn = document.getElementById(`btn-${hypoId}-${viewId}`);
            if (selectedBtn) {
                selectedBtn.classList.remove('text-gray-500', 'font-semibold', 'hover:bg-gray-200/50');
                selectedBtn.classList.add('bg-white', 'shadow-sm', 'text-brand-dark', 'font-bold', 'border', 'border-gray-200');
            }

            section.querySelectorAll('.perspective-content, .side-by-side-grid').forEach(view => {
                view.classList.remove('active');
            });
            
            const selectedView = document.getElementById(`${hypoId}-view-${viewId}`);
            if (selectedView) {
                selectedView.classList.add('active');
            }
        }

        // Sistema Accordion seguro com ScrollHeight para não cortar/vazar texto
        function toggleAccordion(button) {
            const content = button.nextElementSibling;
            const icon = button.querySelector('.accordion-icon');
            
            if (content.style.maxHeight) {
                content.style.maxHeight = null;
                icon.style.transform = "rotate(0deg)";
            } else {
                // Aplica limite massivo que sempre suportará tabelas/texto sem vazar
                content.style.maxHeight = content.scrollHeight + 500 + "px"; 
                icon.style.transform = "rotate(180deg)";
            }
        }
    </script>
